# MySQL?????
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/meetingroom?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:mybatis_user}
spring.datasource.password=${DB_PASSWORD:simplepassword123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ????????????
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

